<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<title>Murder at Blackwood Manor</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div id="game">


<section id="titleScreen">

<h1>
Murder at<br>
Blackwood Manor
</h1>


<p class="subtitle">
A Detective Mystery Adventure
</p>


<button onclick="newGame()">
NEW GAME
</button>


<button id="continueBtn" onclick="continueGame()">
CONTINUE
</button>


<button onclick="openSettings()">
SETTINGS
</button>


</section>



<section id="gameScreen" class="hidden">


<div id="scene">

<h2 id="sceneTitle">
Blackwood Manor
</h2>


<p id="sceneText">
The storm approaches...
</p>


<button onclick="returnMenu()">
MENU
</button>


</div>


</section>



<section id="settings" class="hidden">


<h2>
Settings
</h2>


<button onclick="toggleMusic()">
Music ON/OFF
</button>


<button onclick="returnMenu()">
BACK
</button>


</section>



</div>


<script src="save.js"></script>
<script src="scenes.js"></script>
<script src="game.js"></script>


</body>
</html>
