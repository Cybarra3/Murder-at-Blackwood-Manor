<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Murder at Blackwood Manor</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="game">


<!-- TITLE SCREEN -->

<section id="titleScreen">


<h1>
Murder at<br>
Blackwood Manor
</h1>


<p class="subtitle">
A Detective Mystery Adventure
</p>



<button onclick="newGame()">
NEW GAME
</button>


<button id="continueBtn" onclick="continueGame()">
CONTINUE
</button>


<button onclick="openSettings()">
SETTINGS
</button>


</section>





<!-- GAME SCREEN -->

<section id="gameScreen" class="hidden">



<div id="scene">


<h2 id="sceneTitle">
Blackwood Manor
</h2>


<p id="sceneText">
The storm approaches...
</p>


<div id="roomButtons"></div>



<button id="searchButton" onclick="searchRoom()">
🔎 Search Room
</button>


</div>





<!-- DIALOGUE -->

<div id="dialogueBox" class="hidden">


<img id="characterImage">


<h3 id="characterName"></h3>


<p id="dialogueText"></p>


<div id="choices"></div>


</div>





<div id="gameButtons">

<button onclick="openEvidence()">
🔎 Evidence Board
</button>


<button onclick="openNotebook()">
📖 Detective Notebook
</button>



<button onclick="returnMenu()">
MENU
</button>


</div>



</section>







<!-- SETTINGS -->
<section id="evidenceScreen" class="hidden">

<h2>
Evidence Board
</h2>

<div id="evidenceList"></div>


<button onclick="closeScreens()">
BACK
</button>

</section>





<section id="notebookScreen" class="hidden">

<h2>
Detective Notebook
</h2>


<div id="clueList"></div>


<button onclick="closeScreens()">
BACK
</button>

</section>
<section id="settings" class="hidden">


<h2>
Settings
</h2>


<button onclick="toggleMusic()">
🎵 Music ON/OFF
</button>


<button onclick="returnMenu()">
BACK
</button>


</section>



</div>





<script src="save.js"></script>
<script src="scenes.js"></script>
<script src="rooms.js"></script>
<script src="dialogue.js"></script>
<script src="inventory.js"></script>
<script src="evidence.js"></script>
<script src="game.js"></script>



</body>

</html>
